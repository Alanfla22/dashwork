<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="styles.css" />
    <title>D3</title>
</head>
<body>
    <nav class="navbar">
        <div>
            <form class="testForm" id="testForm">
                <button class="submit" type="submit" value="Submit">Filtrar</button>
                <fieldset>
                    <div class="dropdown">
                        <button class="dropbtn">Data
                        </button>
                        <div class="dropdown-content" id="fieldData">
                        </div>
                    </div>
                </fieldset>
                <fieldset>
                    <div class="dropdown">
                        <button class="dropbtn">Tarefa
                        </button>
                        <div class="dropdown-content" id="fieldTarefa">
                        </div>
                    </div> 
                </fieldset>
                <fieldset>
                    <div class="dropdown">
                        <button class="dropbtn">Tipo
                        </button>
                        <div class="dropdown-content" id="fieldTipo">
                        </div>
                    </div> 
                </fieldset>
            </form>
        </div>
        <div>
            <div class="tab">
                <button class="tablinks" id="defaultOpen">S522</button>
                <button class="tablinks" id="apdOpen">APD</button>
            </div>
        </div>
        <div>
            <input type="file" class="myfile" id="myfile" webkitdirectory multiple></input>    
        </div>
    </nav>
    <div class="wrapper">
        <div class="graficos">
            <div class="graficos_1">
                <div><svg id="myhist" width="100%" height="100%" viewBox="0 0 500 350" preserveAspectRatio="xMidYMid meet"></svg></div>
                <div>                    
                    <select style="float: right;margin-right: 270px;" class="selector" id="mypieSelector">
                        <option value="Tipo">Tipo</option>
                        <option value="Tarefa">Tarefa</option>
                        <option value="Guarda">Guarda</option>
                    </select>
                    <svg id="mypie" width="100%" height="100%" viewBox="0 0 650 350" preserveAspectRatio="xMidYMid meet"></svg>
                </div>
            </div>
            <div class="graficos_2">
                <div><svg id="myhistapd" width="100%" height="100%" viewBox="0 0 500 350" preserveAspectRatio="xMidYMid meet"></svg></div>
                <div>                    
                    <select style="float: right;margin-right: 270px;" class="selector" id="mypieapdSelector">
                        <option value="Tipo">Tipo</option>
                        <option value="Tarefa">Tarefa</option>
                        <option value="Guarda">Guarda</option>
                    </select>
                    <svg id="mypieapd" width="100%" height="100%" viewBox="0 0 650 350" preserveAspectRatio="xMidYMid meet"></svg>
                </div>
            </div>            

        </div>
        <div class="tabela">
            <table id="mytable"></table>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/d3@7"></script>
    <script type=module src="script.js"></script>
</body>
</html>
